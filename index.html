<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Nuraan 🤍</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#fff4f8;
      --bg-2:#ffdce8;
      --bg-3:#ffc8dc;
      --text:#5d4450;
      --heading:#a4123a;
      --accent-dark:#851133;
      --white:#ffffff;
      --shadow:0 24px 70px rgba(112, 18, 52, 0.18);
      --radius:32px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      min-height:100%;
    }

    body{
      min-height:100vh;
      font-family:"Playfair Display", serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.85), transparent 32%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
      padding:24px;
    }

    .floating-layer{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35), transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.25), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(120,0,35,0.08), transparent 35%);
      pointer-events:none;
    }

    body::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, transparent 58%, rgba(71, 7, 27, 0.16) 100%);
      pointer-events:none;
    }

    .float{
      position:absolute;
      bottom:-40px;
      width:18px;
      height:18px;
      transform:rotate(45deg);
      opacity:0.32;
      animation:floatUp linear infinite;
      pointer-events:none;
      filter:drop-shadow(0 0 8px rgba(120,0,30,0.18));
      z-index:0;
    }

    .float::before,
    .float::after{
      content:"";
      position:absolute;
      width:18px;
      height:18px;
      background:inherit;
      border-radius:50%;
    }

    .float::before{
      top:-9px;
      left:0;
    }

    .float::after{
      left:-9px;
      top:0;
    }

    @keyframes floatUp{
      0%{
        transform:translateY(0) translateX(0) rotate(45deg) scale(var(--scale));
        opacity:0;
      }
      15%{
        opacity:0.34;
      }
      100%{
        transform:translateY(-120vh) translateX(var(--drift)) rotate(405deg) scale(var(--scale));
        opacity:0;
      }
    }

    .card-wrap{
      position:relative;
      z-index:2;
      width:min(100%, 720px);
    }

    .card{
      position:relative;
      background:linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,241,246,0.96));
      border:1px solid rgba(255,255,255,0.65);
      backdrop-filter:blur(10px);
      padding:64px 52px 44px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      text-align:center;
      overflow:hidden;
      opacity:0;
      transform:translateY(24px);
      animation:cardEnter 1s ease forwards;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.55), transparent 42%, rgba(255,214,229,0.32));
      pointer-events:none;
    }

    .card::after{
      content:"";
      position:absolute;
      inset:-18px;
      border-radius:42px;
      background:linear-gradient(120deg, rgba(255,214,229,0.5), rgba(255,255,255,0.8));
      opacity:0.35;
      filter:blur(28px);
      z-index:-1;
      animation:glowPulse 4.5s ease-in-out infinite;
    }

    @keyframes cardEnter{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes glowPulse{
      0%,100%{
        opacity:0.2;
      }
      50%{
        opacity:0.42;
      }
    }

    .eyebrow{
      display:inline-block;
      letter-spacing:0.18em;
      text-transform:uppercase;
      font-size:0.72rem;
      color:rgba(133,17,51,0.72);
      margin-bottom:14px;
    }

    h1{
      font-family:"Great Vibes", cursive;
      font-size:clamp(2.8rem, 5vw, 4.3rem);
      color:var(--heading);
      margin-bottom:18px;
      line-height:1.05;
    }

    .divider{
      width:86px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(162,18,58,0.7), transparent);
      margin:0 auto 24px;
    }

    .copy{
      display:grid;
      gap:14px;
      margin-bottom:22px;
      min-height:200px;
    }

    p{
      font-size:1.07rem;
      line-height:1.9;
      color:var(--text);
      min-height:3.8em;
    }

    #t1el, #t2el, #t3el{
      display:block;
      width:100%;
    }

    .question{
      font-size:clamp(1.35rem, 2.8vw, 1.75rem);
      color:var(--accent-dark);
      margin:8px 0 26px;
      min-height:3em;
      font-style:italic;
      line-height:1.45;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:14px;
      opacity:0;
      transform:translateY(10px);
      pointer-events:none;
      transition:opacity 0.8s ease, transform 0.8s ease;
      flex-wrap:wrap;
    }

    .buttons.show{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    button{
      min-width:160px;
      padding:15px 26px;
      border-radius:999px;
      border:none;
      font-size:1rem;
      cursor:pointer;
      font-family:"Playfair Display", serif;
      font-weight:600;
      letter-spacing:0.02em;
      transition:transform 0.24s ease, box-shadow 0.24s ease;
      box-shadow:0 10px 26px rgba(133,17,51,0.14);
    }

    button:hover{
      transform:translateY(-3px);
      box-shadow:0 16px 30px rgba(133,17,51,0.18);
    }

    button:disabled{
      opacity:0.7;
      cursor:not-allowed;
      transform:none;
    }

    .yes{
      background:linear-gradient(135deg, var(--accent-dark), #d62857);
      color:var(--white);
    }

    .ofcourse{
      background:rgba(255,255,255,0.92);
      color:var(--accent-dark);
      border:1px solid rgba(133,17,51,0.12);
    }

    .status{
      margin-top:18px;
      min-height:24px;
      font-size:0.95rem;
      color:rgba(93,68,80,0.86);
    }

    .signature{
      margin-top:26px;
      font-size:0.95rem;
      color:rgba(93,68,80,0.8);
    }

    @media (max-width: 640px){
      body{
        padding:18px;
      }

      .card{
        padding:42px 24px 30px;
        border-radius:26px;
      }

      .copy{
        min-height:240px;
      }

      p{
        font-size:1rem;
        line-height:1.8;
        min-height:4.2em;
      }

      .question{
        min-height:3.4em;
      }

      button{
        width:100%;
      }

      .buttons{
        gap:12px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      .float,
      .card::after{
        animation:none !important;
      }

      .buttons{
        transition:none;
      }

      .card{
        animation:none !important;
        opacity:1;
        transform:none;
      }
    }
  </style>
</head>
<body>

  <div class="floating-layer" id="floatingLayer"></div>

  <div class="card-wrap">
    <div class="card">
      <div class="eyebrow">A small note for you</div>
      <h1>Nuraan</h1>
      <div class="divider"></div>

      <div class="copy">
        <p id="t1el"></p>
        <p id="t2el"></p>
        <p id="t3el"></p>
      </div>

      <div class="question" id="qel"></div>

      <div class="buttons" id="buttons">
        <button type="button" class="yes" data-page="yes.html" data-answer="Yes">Yes 🤍</button>
        <button type="button" class="ofcourse" data-page="ofcourse.html" data-answer="Of course">Of course 💗</button>
      </div>

      <div class="status" id="status" aria-live="polite"></div>
      <div class="signature">— From me, with sincerity</div>
    </div>
  </div>

  <script>
    const FORMSPREE_ENDPOINT = "https://formspree.io/f/xnjjowzp";

    const heartColors = ["#8a0f2e", "#b1123a", "#d62857", "#cc406d"];
    const floatingLayer = document.getElementById("floatingLayer");

    for (let i = 0; i < 26; i++) {
      const heart = document.createElement("div");
      heart.className = "float";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.background = heartColors[Math.floor(Math.random() * heartColors.length)];
      heart.style.animationDuration = (Math.random() * 9 + 13) + "s";
      heart.style.opacity = (Math.random() * 0.22 + 0.14).toFixed(2);
      heart.style.setProperty("--scale", (Math.random() * 0.55 + 0.72).toFixed(2));
      heart.style.setProperty("--drift", (Math.random() * 120 - 60).toFixed(0) + "px");
      floatingLayer.appendChild(heart);
    }

    const lines = [
      { text: "I didn’t want to ask you this in a random way.", el: document.getElementById("t1el") },
      { text: "I really love spending time with you — every conversation, every laugh, and every moment with you feels easy, genuine, and special to me.", el: document.getElementById("t2el") },
      { text: "You’ve become someone I care about deeply, and I wanted to ask you this properly, because you truly mean a lot to me.", el: document.getElementById("t3el") },
      { text: "Nuraan, will you be my girlfriend?", el: document.getElementById("qel") }
    ];

    const buttons = document.getElementById("buttons");
    const statusEl = document.getElementById("status");
    const actionButtons = [...document.querySelectorAll(".buttons button")];

    let lineIndex = 0;
    let charIndex = 0;

    function typeLine() {
      if (lineIndex >= lines.length) {
        buttons.classList.add("show");
        return;
      }

      const current = lines[lineIndex];

      if (charIndex < current.text.length) {
        current.el.textContent += current.text.charAt(charIndex++);
        setTimeout(typeLine, 34);
      } else {
        lineIndex++;
        charIndex = 0;
        setTimeout(typeLine, 520);
      }
    }

    typeLine();

    function getRedirectUrl(page) {
      return new URL(page, window.location.href).href;
    }

    async function sendReply(answer, page) {
      actionButtons.forEach(btn => btn.disabled = true);
      statusEl.textContent = "Sending your reply...";

      try {
        const response = await fetch(FORMSPREE_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            answer: answer,
            person: "Nuraan",
            page: window.location.href,
            submitted_at: new Date().toISOString()
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          console.error(data);
          throw new Error("Form submission failed");
        }

        statusEl.textContent = "Reply sent!";

        setTimeout(() => {
          window.location.href = getRedirectUrl(page);
        }, 400);
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Could not send reply. Please try again.";
        actionButtons.forEach(btn => btn.disabled = false);
      }
    }

    actionButtons.forEach(button => {
      button.addEventListener("click", () => {
        const answer = button.dataset.answer;
        const page = button.dataset.page;
        sendReply(answer, page);
      });
    });
  </script>
</body>
</html>
